name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Lua 5.1
        run: sudo apt-get update && sudo apt-get install -y lua5.1
      - name: Syntax-check Lua files
        run: find . -name '*.lua' -print0 | xargs -0 -n1 luac5.1 -p

  package:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          path: Spy2
      - name: Package addon
        run: zip -r Spy2.zip Spy2 -x 'Spy2/.git/*' 'Spy2/.github/*'
      - uses: actions/upload-artifact@v4
        with:
          name: Spy2
          path: Spy2.zip
